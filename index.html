<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antikythera - Malkafa Premium</title>
    <style>
        :root {
            --bg: #0A0414;
            --panel: #1F0B42;
            --gold: #FFD700;
            --text: #FFFFFF;
            --gray: #A094B1;
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); color: var(--text); overflow-x: hidden;
        }
        /* GİRİŞ EKRANI */
        #intro {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(180deg, var(--bg) 0%, var(--panel) 100%);
        }
        .logo-circle {
            width: 120px; height: 120px; border-radius: 60px;
            border: 3px solid var(--gold); display: flex; align-items: center;
            justify-content: center; font-size: 50px; margin-bottom: 20px;
            box-shadow: 0 0 20px var(--gold);
        }
        .brand { font-size: 36px; font-weight: 900; letter-spacing: 5px; color: var(--gold); margin: 0; }
        .start-btn {
            margin-top: 40px; padding: 15px 60px; background: var(--gold);
            color: var(--bg); border: none; border-radius: 30px;
            font-weight: bold; cursor: pointer; font-size: 18px;
        }

        /* ANA MENÜ */
        #menu { display: none; padding: 20px; text-align: center; }
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; max-width: 500px; margin: 20px auto;
        }
        .card {
            background: var(--panel); border: 1px solid rgba(255,215,0,0.2);
            padding: 20px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--gold); transform: scale(1.05); }
        .card-icon { font-size: 40px; margin-bottom: 10px; }

        /* DETAY SAYFASI */
        #detail { display: none; padding: 20px; }
        .back-btn { color: var(--gold); cursor: pointer; font-weight: bold; margin-bottom: 20px; display: block; }
        .hero-icon { font-size: 60px; text-align: center; margin: 30px 0; }
        .accordion {
            background: #16082A; border-radius: 12px; margin-bottom: 10px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }
        .acc-header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; color: var(--gold);
            font-weight: bold; font-size: 14px;
        }
        .acc-body { padding: 0 20px 20px 20px; color: var(--gray); line-height: 1.6; display: none; }
        .play-btn {
            display: inline-block; margin-top: 15px; border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 15px; border-radius: 5px; text-decoration: none;
            font-size: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="logo-circle">⚙️</div>
        <h1 class="brand">ANTIKYTHERA</h1>
        <p style="color: var(--gray)">Mekanizmanın Gizemini Çözün</p>
        <button class="start-btn" onclick="showView('menu')">BAŞLA</button>
    </div>

    <div id="menu">
        <h2 style="margin-bottom: 30px;">Bir Uzmanlık Seçin</h2>
        <div class="grid" id="menu-grid"></div>
    </div>

    <div id="detail">
        <span class="back-btn" onclick="showView('menu')">← Geri Dön</span>
        <div id="detail-content"></div>
    </div>

    <script>
        const data = [
            { name: 'Arkeolog', icon: '🏛️', sections: [
                { t: 'Arkeolog', c: 'Yeryüzündeki kalıntıları inceleyerek geçmişi gün ışığına çıkarır.' },
                { t: 'Dönem', c: 'M.Ö. 75-50 arası. Gemi Roma’ya giderken battı.' },
                { t: 'Çıkarma', c: '1900-1901’de sünger dalgıçları tarafından bulundu.' }
            ]},
            { name: 'Dalgıç', icon: '🤿', sections: [{ t: 'Dalış', c: '60 metre derinlikte yapılan cesur operasyon.' }]},
            { name: 'Konservatör', icon: '🧪', sections: [{ t: 'Koruma', c: 'Eserlerin kimyasal temizlik süreçlerini yönetir.' }]},
            { name: 'Tarihçi', icon: '📜', sections: [{ t: 'Yazıtlar', c: 'Mekanizma üzerindeki antik yazıları deşifre eder.' }]},
            { name: 'Mühendis', icon: '⚙️', sections: [{ t: 'Mekanizma', c: 'Dişli çarkların çalışma matematiğini çözer.' }]},
            { name: 'Gazeteci', icon: '🎤', sections: [{ t: 'Haber', c: 'Keşfin dünyaya duyurulmasını sağlar.' }]}
        ];

        function showView(viewId) {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('detail').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
        }

        const grid = document.getElementById('menu-grid');
        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-icon">${item.icon}</div><div>${item.name}</div>`;
            card.onclick = () => showDetail(index);
            grid.appendChild(card);
        });

        function showDetail(index) {
            const item = data[index];
            const content = document.getElementById('detail-content');
            let html = `<div class="hero-icon">${item.icon}</div><h2 style="text-align:center">${item.name}</h2>`;
            
            item.sections.forEach((s, i) => {
                html += `
                <div class="accordion">
                    <div class="acc-header" onclick="toggleAcc(${i})">${s.t.toUpperCase()} <span>▼</span></div>
                    <div class="acc-body" id="acc-${i}">${s.c} ${i===1 ? '<br><a href="#" class="play-btn">AS PAIZOUME (OYNA)</a>' : ''}</div>
                </div>`;
            });
            content.innerHTML = html;
            showView('detail');
        }

        function toggleAcc(id) {
            const el = document.getElementById('acc-'+id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
