<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malkafa | Heritage Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0A0A0B; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: #E2E2E2; }
        .serif { font-family: 'Cinzel', serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gold { background-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); transition: all 0.3s ease; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, var(--dark-bg) 80%); z-index: -1; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-overlay"></div>

    <header class="p-6 flex justify-between items-center border-b border-white/5 relative z-10">
        <div>
            <h1 class="serif text-2xl tracking-widest text-[#D4AF37]">MALKAFA</h1>
            <p id="nav-sub" class="text-[10px] tracking-[0.3em] uppercase opacity-50">İnteraktif Eğitim Sistemleri</p>
        </div>
        
        <div class="flex gap-2">
            <button onclick="changeLang('tr')" class="px-2 py-1 text-xs glass-panel rounded hover:text-[#D4AF37]">TR</button>
            <button onclick="changeLang('en')" class="px-2 py-1 text-xs glass-panel rounded hover:text-[#D4AF37]">EN</button>
            <button onclick="changeLang('gr')" class="px-2 py-1 text-xs glass-panel rounded hover:text-[#D4AF37]">GR</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row p-6 lg:p-12 gap-8 relative z-10">
        <section class="lg:w-3/5 flex flex-col justify-center">
            <span id="hero-tag" class="text-[#D4AF37] text-sm font-bold tracking-widest mb-2 uppercase">Bölüm: Samothraki Kazıları</span>
            <h2 id="hero-title" class="serif text-5xl lg:text-7xl mb-6 leading-tight">Zamanın Katmanlarını Keşfedin</h2>
            <p id="hero-desc" class="text-lg text-gray-400 max-w-xl leading-relaxed mb-10">
                Bu modül, Helenistik dönemin mimari sırlarını ve kazı alanındaki verileri interaktif olarak sunar.
            </p>
            <div class="flex flex-wrap gap-4">
                <button id="btn-audio" class="btn-gold text-black px-10 py-4 rounded-full font-extrabold">SESLİ REHBERİ BAŞLAT</button>
                <button id="btn-doc" class="glass-panel px-10 py-4 rounded-full font-bold">EĞİTİM DOSYALARI</button>
            </div>
        </section>

        <section class="lg:w-2/5 flex flex-col gap-4">
            <div class="glass-panel p-6 rounded-3xl">
                <h3 id="mod-title" class="text-sm font-bold text-[#D4AF37] mb-4 uppercase tracking-widest text-center">Aktif Modüller</h3>
                <div class="space-y-3">
                    <div class="p-4 rounded-2xl bg-white/10 border border-[#D4AF37]/30">
                        <h4 id="mod-item-1" class="font-semibold text-center">Samothraki Sunağı Tarihçesi</h4>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const translations = {
            tr: {
                navSub: "İnteraktif Eğitim Sistemleri",
                heroTag: "Bölüm: Samothraki Kazıları",
                heroTitle: "Zamanın Katmanlarını Keşfedin",
                heroDesc: "Bu modül, Helenistik dönemin mimari sırlarını ve kazı alanındaki verileri interaktif olarak sunar.",
                btnAudio: "SESLİ REHBERİ BAŞLAT",
                btnDoc: "EĞİTİM DOSYALARI",
                modTitle: "Aktif Modüller",
                modItem1: "Samothraki Sunağı Tarihçesi"
            },
            en: {
                navSub: "Interactive Education Systems",
                heroTag: "Chapter: Samothraki Excavations",
                heroTitle: "Discover the Layers of Time",
                heroDesc: "This module presents the architectural secrets of the Hellenistic period and excavation data interactively.",
                btnAudio: "START AUDIO GUIDE",
                btnDoc: "EDUCATION FILES",
                modTitle: "Active Modules",
                modItem1: "History of Samothrace Altar"
            },
            gr: {
                navSub: "Διαδραστικά Εκπαιδευτικά Συστήματα",
                heroTag: "Κεφάλαιο: Ανασκαφές Σαμοθράκης",
                heroTitle: "Ανακαλύψτε τα Στρώματα του Χρόνου",
                heroDesc: "Αυτή η ενότητα παρουσιάζει τα αρχιτεκτονικά μυστικά της Ελληνιστικής περιόδου και τα δεδομένα ανασκαφών διαδραστικά.",
                btnAudio: "ΕΝΑΡΞΗ ΑΚΟΥΣΤΙΚΟΥ ΟΔΗΓΟΥ",
                btnDoc: "ΕΚΠΑΙΔΕΥΤΙΚΑ ΑΡΧΕΙΑ",
                modTitle: "Ενεργές Ενότητες",
                modItem1: "Ιστορία του Βωμού της Σαμοθράκης"
            }
        };

        function changeLang(lang) {
            document.getElementById('nav-sub').innerText = translations[lang].navSub;
            document.getElementById('hero-tag').innerText = translations[lang].heroTag;
            document.getElementById('hero-title').innerText = translations[lang].heroTitle;
            document.getElementById('hero-desc').innerText = translations[lang].heroDesc;
            document.getElementById('btn-audio').innerText = translations[lang].btnAudio;
            document.getElementById('btn-doc').innerText = translations[lang].btnDoc;
            document.getElementById('mod-title').innerText = translations[lang].modTitle;
            document.getElementById('mod-item-1').innerText = translations[lang].modItem1;
        }
    </script>
</body>
</html>
